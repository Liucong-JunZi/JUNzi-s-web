name: E2E Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * *' # Nightly at 03:17 UTC
  workflow_dispatch:
    inputs:
      tier:
        description: 'Test tier'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, regression, full]

env:
  TEST_MODE: "true"
  DB_PASSWORD: e2e_test_password_2024
  DB_NAME: personal_website
  DB_USER: junzi
  REDIS_PASSWORD: e2e_redis_password_2024
  MINIO_ACCESS_KEY: e2eaccesskey1234
  MINIO_SECRET_KEY: e2esecretkey1234567890abcdef
  JWT_SECRET: e2e-jwt-secret-with-3-categories-UPPER-lower-1234-!@#$
  GITHUB_CLIENT_ID: dummy
  GITHUB_CLIENT_SECRET: dummy
  GIN_MODE: debug
  CORS_ALLOWED_ORIGINS: http://localhost

jobs:
  # ==================== PR: Smoke (P0) ====================
  e2e-smoke:
    name: E2E Smoke (P0)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cp .env.example .env
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${{ env.DB_PASSWORD }}/" .env
          sed -i "s/REDIS_PASSWORD=.*/REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}/" .env
          sed -i "s/MINIO_ACCESS_KEY=.*/MINIO_ACCESS_KEY=${{ env.MINIO_ACCESS_KEY }}/" .env
          sed -i "s/MINIO_SECRET_KEY=.*/MINIO_SECRET_KEY=${{ env.MINIO_SECRET_KEY }}/" .env
          sed -i "s/JWT_SECRET=.*/JWT_SECRET=${{ env.JWT_SECRET }}/" .env
          sed -i "s/GIN_MODE=.*/GIN_MODE=${{ env.GIN_MODE }}/" .env
          echo "TEST_MODE=true" >> .env
          docker compose up -d --build --wait

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Backend healthy"; break
            fi
            echo "Waiting... ($i/30)"; sleep 2
          done

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (P0)
        working-directory: e2e
        run: npx playwright test --grep @p0
        env:
          E2E_BASE_URL: http://localhost

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: e2e/reports/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  # ==================== Nightly: Regression (P0+P1) ====================
  e2e-regression:
    name: E2E Regression (P0+P1) - shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'regression')
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cp .env.example .env
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${{ env.DB_PASSWORD }}/" .env
          sed -i "s/REDIS_PASSWORD=.*/REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}/" .env
          sed -i "s/MINIO_ACCESS_KEY=.*/MINIO_ACCESS_KEY=${{ env.MINIO_ACCESS_KEY }}/" .env
          sed -i "s/MINIO_SECRET_KEY=.*/MINIO_SECRET_KEY=${{ env.MINIO_SECRET_KEY }}/" .env
          sed -i "s/JWT_SECRET=.*/JWT_SECRET=${{ env.JWT_SECRET }}/" .env
          sed -i "s/GIN_MODE=.*/GIN_MODE=${{ env.GIN_MODE }}/" .env
          echo "TEST_MODE=true" >> .env
          docker compose up -d --build --wait

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Backend healthy"; break
            fi
            echo "Waiting... ($i/30)"; sleep 2
          done

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Cache E2E deps
        uses: actions/cache@v5
        with:
          path: e2e/node_modules
          key: e2e-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run regression tests -- shard ${{ matrix.shard }}
        working-directory: e2e
        run: npx playwright test --shard=${{ matrix.shard }} --grep "@p0|@p1"
        env:
          E2E_BASE_URL: http://localhost

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-regression-artifacts-${{ strategy.shard-index }}
          path: e2e/reports/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  # ==================== Release: Full (P0+P1+P2) ====================
  e2e-full:
    name: E2E Full Suite - shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'full'
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cp .env.example .env
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${{ env.DB_PASSWORD }}/" .env
          sed -i "s/REDIS_PASSWORD=.*/REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}/" .env
          sed -i "s/MINIO_ACCESS_KEY=.*/MINIO_ACCESS_KEY=${{ env.MINIO_ACCESS_KEY }}/" .env
          sed -i "s/MINIO_SECRET_KEY=.*/MINIO_SECRET_KEY=${{ env.MINIO_SECRET_KEY }}/" .env
          sed -i "s/JWT_SECRET=.*/JWT_SECRET=${{ env.JWT_SECRET }}/" .env
          echo "TEST_MODE=true" >> .env
          docker compose up -d --build --wait

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Backend healthy"; break
            fi
            echo "Waiting... ($i/30)"; sleep 2
          done

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run full suite -- shard ${{ matrix.shard }}
        working-directory: e2e
        run: npx playwright test --shard=${{ matrix.shard }}
        env:
          E2E_BASE_URL: http://localhost

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-artifacts-${{ strategy.shard-index }}
          path: e2e/reports/
          retention-days: 30

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
