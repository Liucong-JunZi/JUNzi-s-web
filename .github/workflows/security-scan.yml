name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  go-vulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck ./...

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      - name: Run npm audit
        working-directory: frontend
        run: npx npm-audit --audit-level=moderate

  docker-image-check:
    name: Docker Image Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check image versions
        run: |
          echo "=== Docker image versions in use ==="
          grep -E 'image:' docker-compose.yml || true
          echo ""
          echo "=== Dockerfile base images ==="
          grep -E '^FROM ' docker/backend/Dockerfile docker/frontend/Dockerfile
          echo ""
          # Fail if any FROM line uses :latest (mutable tag)
          if grep -E '^FROM .*:latest' docker/backend/Dockerfile docker/frontend/Dockerfile; then
            echo "::error::Mutable :latest tag found in Dockerfile. Pin to a specific version."
            exit 1
          fi
          echo "No mutable :latest tags found."
