# ==================== 安全说明 ====================
# TLS/HTTPS: This compose file listens on HTTP (port 80) only.
# For production, use one of:
#   1. External reverse proxy (Cloudflare, AWS ALB) for TLS termination
#   2. Add a separate nginx container with TLS certs
#   3. Use Caddy with auto-TLS as the frontend container
# The backend HSTS header ensures browsers only use HTTPS once TLS is active.
# ==================== 基础设施服务 ====================

# MySQL 8.0 — pinned to specific patch version for reproducibility
services:
  mysql:
    image: mysql:8.0.40
    container_name: junzi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env file}
      MYSQL_DATABASE: ${DB_NAME:-personal_website}
      MYSQL_USER: ${DB_USER:-junzi}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env file}
    # ports:
    #   - "${MYSQL_PORT:-3306}:3306"
    # Security: MySQL port not exposed by default. Uncomment above for debugging only.
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - junzi-backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:?DB_PASSWORD must be set}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — pinned to specific version for reproducibility
  redis:
    image: redis:7.4-alpine
    container_name: junzi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env file}
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    # Security: Redis port not exposed by default. Uncomment above for debugging only.
    volumes:
      - redis_data:/data
    networks:
      - junzi-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: junzi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env file}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env file}
    # ports:
    #   - "${MINIO_API_PORT:-9000}:9000"
    #   - "${MINIO_CONSOLE_PORT:-9001}:9001"
    # Security: MinIO ports not exposed by default. Uncomment for debugging only.
    # Access console via: kubectl port-forward or ssh tunnel if needed.
    volumes:
      - minio_data:/data
    networks:
      - junzi-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== 应用服务 ====================

  # Backend (Go API)
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: junzi-backend
    restart: unless-stopped
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - APP_ENV=production
      - SERVER_PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-junzi}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env file}
      - DB_NAME=${DB_NAME:-personal_website}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env file}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env file}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env file}
      - MINIO_BUCKET=${MINIO_BUCKET:-uploads}
      # MINIO_USE_SSL=false is safe because:
      #   1. Traffic stays within a Docker isolated bridge network (junzi-backend)
      #   2. MinIO has no host port exposure — unreachable from outside Docker
      #   3. Only the backend service can reach MinIO (frontend is on a separate network)
      - MINIO_USE_SSL=false
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-http://localhost/api/auth/github/callback}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env file}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - junzi-frontend
      - junzi-backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    container_name: junzi-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    # Frontend is only on junzi-frontend network — cannot reach MySQL, Redis, or MinIO.
    # Network segmentation ensures infrastructure services are isolated from the edge.
    networks:
      - junzi-frontend

# ==================== 网络配置 ====================
# A05 — Network segmentation: two isolated Docker bridge networks
#   junzi-frontend: frontend <-> backend only
#   junzi-backend:  backend <-> mysql, redis, minio only
# The frontend container cannot reach infrastructure services (MySQL, Redis, MinIO).
networks:
  junzi-frontend:
    driver: bridge
  junzi-backend:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
