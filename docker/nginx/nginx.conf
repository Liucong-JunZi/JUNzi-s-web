    #          - ./docker/nginx/ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
    #          - ./docker/nginx/ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    #   3. Uncomment the HTTPS server block below.
    #   4. Uncomment the HTTP-to-HTTPS redirect block below (replaces the
    #      active HTTP block above).
    #   5. Reload nginx: docker exec junzi-frontend nginx -s reload
